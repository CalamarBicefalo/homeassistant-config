  - type: sections
    max_columns: 2
    title: Living Room
    path: living-room
    icon: mdi:sofa
    subview: true
    sections:
      - type: grid
        cards:
          - type: custom:custom-features-card
            features:
              - type: custom:service-call
                entries:
                  - type: button
                    entity_id: ''
                    icon: mdi:arrow-left-circle
                    styles: |-
                      :host {
                      flex-basis: fit-content;
                      }
                    thumb: transparent
                    tap_action:
                      action: navigate
                      navigation_path: /dashboard-playground
                  - type: toggle
                    entity_id: input_boolean.activity_lock_living_room
                    tap_action:
                      action: toggle
                      target:
                        entity_id: input_boolean.activity_lock_living_room
                      data: {}
                    icon: mdi:lock
                    haptics: true
                    unchecked_icon: ''
                    checked_icon: ''
                    thumb: md3-switch
                    autofill_entity_id: true
                    label: '{{ states(''input_select.living_room_activity'') }} '
                    styles: |-
                      :host {

                      --accent-color: #ca0c3dcc;
                      --switch-checked-button-color: #ca0c0c;
                      --switch-checked-track-color: #ffb6c3a8;
                      .background {
                          backdrop-filter: blur(12px);
                          -webkit-backdrop-filter: blur(6.8px);
                      }
                      .icon-label {
                      flex-direction: column;
                      align-items: start;
                      gap: 0px;
                      }
                      .icon-label::before {
                      
                        font-size: 24px;
                        line-height:22px;
                        content:"Living Room";
                      }
                      .label {
                      font-weight: 300;
                      font-size: 16px;
                      line-height:20px;
                      }
                      .icon {
                      display: none;
                      }
                      }
                    allow_list: true
                    check_numeric: false
                styles: |-
                  :host {
                  font-size: 30px;
                  height: 120px;
                  }
              - type: custom:service-call
                entries:
                  - type: selector
                    entity_id: input_select.living_room_activity
                    icon: mdi:sofa
                    options:
                      - entity_id: input_select.living_room_activity
                        option: Present
                        tap_action:
                          action: perform-action
                          perform_action: input_select.select_option
                          data:
                            option: Present
                          target:
                            entity_id: input_select.living_room_activity
                        haptics: true
                        icon: mdi:account-badge
                        label: Present
                      - entity_id: input_select.living_room_activity
                        option: Watching TV
                        tap_action:
                          action: perform-action
                          perform_action: input_select.select_option
                          data:
                            option: Watching TV
                          target:
                            entity_id: input_select.living_room_activity
                        icon: mdi:youtube-tv
                        label: TV
                        haptics: true
                      - entity_id: input_select.living_room_activity
                        option: Gaming
                        tap_action:
                          action: perform-action
                          perform_action: input_select.select_option
                          data:
                            option: Gaming
                          target:
                            entity_id: input_select.living_room_activity
                        icon: mdi:controller-classic
                        label: Gaming
                        haptics: true
                      - entity_id: input_select.living_room_activity
                        option: Drumming
                        tap_action:
                          action: perform-action
                          perform_action: input_select.select_option
                          data:
                            option: Drumming
                          target:
                            entity_id: input_select.living_room_activity
                        label: Drumming
                        icon: fa7-solid:drum
                        haptics: true
                      - entity_id: input_select.living_room_activity
                        option: Relaxing
                        tap_action:
                          action: perform-action
                          perform_action: input_select.select_option
                          data:
                            option: Relaxing
                          target:
                            entity_id: input_select.living_room_activity
                        label: Relaxing
                        icon: mdi:palm-tree
                        haptics: true
                      - entity_id: input_select.living_room_activity
                        option: Dining
                        tap_action:
                          action: perform-action
                          perform_action: input_select.select_option
                          data:
                            option: Dining
                          target:
                            entity_id: input_select.living_room_activity
                        label: Dining
                        icon: mdi:silverware-fork-knife
                        haptics: true
                    thumb: default
                styles: |-
                  :host {

                      --feature-color: {{ '#ff070766' if is_state('input_boolean.activity_lock_living_room', 'on') else '#ffc10766' }};
                      backdrop-filter: blur(6.8px);
                      -webkit-backdrop-filter: blur(6.8px);
                      border: 1px solid rgba(64, 17, 58, 0.3);

                  }
            styles: >-
              :host {

              ha-card {

              background: linear-gradient(to top, rgba(0, 0, 0, 0.8), rgba(0, 0,
              0, 0)), url(/local/img/living_room.jpg) no-repeat center center;

              background-size: cover;

              }

              }
            transparent: false
            feature_height: 54
            grid_options:
