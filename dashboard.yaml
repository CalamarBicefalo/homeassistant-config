            icon: mdi:washing-machine
            states:
              - state: Wet Clothes Inside
                icon_color: red
                icon: mdi:tshirt-crew
                styles:
                  transform: scale(1.15)
                  filter: brightness(1.2)
                  border: 2px solid red
                  border-radius: 50%
                  box-shadow: 0 0 10px red
              - state: Mold Alert
                icon_color: red
                icon: mdi:molecule
                styles:
                  transform: scale(1.15)
                  filter: brightness(1.2)
                  border: 2px solid red
                  border-radius: 50%
                  box-shadow: 0 0 10px red
              - state: Washing
                icon_color: blue
                icon: mdi:washing-machine
                styles:
                  animation: spin 2s linear infinite
                  border: 2px solid var(--primary-color)
                  border-radius: 50%
                  box-shadow: 0 0 10px var(--primary-color)
              - state: Drying
                icon_color: orange
                icon: mdi:heat-wave
              - state: "Off"
                icon_color: grey
                icon: mdi:washing-machine
                styles:
                  opacity: "0.6"
