                    styles: |-
                      :host {
                      flex-basis: fit-content;
                      }
                    thumb: transparent
                    tap_action:
                      action: navigate
                      navigation_path: /dashboard-playground
                  - type: toggle
                    entity_id: input_boolean.activity_lock_living_room
                    tap_action:
                      action: toggle
                      target:
                        entity_id: input_boolean.activity_lock_living_room
                      data: {}
                    icon: mdi:lock
                    haptics: true
                    unchecked_icon: ""
                    checked_icon: ""
                    thumb: md3-switch
                    autofill_entity_id: true
                    label: "{{ states('input_select.living_room_activity') }} "
                    styles: |-
                      :host {

                      --accent-color: #ca0c3dcc;
                      --switch-checked-button-color: #ca0c0c;
                      --switch-checked-track-color: #ffb6c3a8;
                      .background {
                          backdrop-filter: blur(12px);
                          -webkit-backdrop-filter: blur(6.8px);
                      }
                      .icon-label {
                      flex-direction: column;
                      align-items: start;
                      gap: 0px;
                      }
                      .icon-label::before {

                        font-size: 24px;
                        line-height:22px;
                        content:"Living Room";
                      }
                      .label {
                      font-weight: 300;
                      font-size: 16px;
                      line-height:20px;
                      }
                      .icon {
                      display: none;
                      }
                      }
                    allow_list: true
                    check_numeric: false
                styles: |-
                  :host{
                  height:120px;
                  }
              - type: custom:service-call
                entries:
                  - type: selector
                    entity_id: input_select.living_room_activity
                    icon: mdi:sofa
                    options:
                      - entity_id: input_select.living_room_activity
                        option: Present
                        tap_action:
                          action: perform-action
                          perform_action: input_select.select_option
                          data:
                            option: Present
                          target:
                            entity_id: input_select.living_room_activity
                        haptics: true
                        icon: mdi:account-badge
                        label: Present
                        hold_action:
                          action: perform-action
                          perform_action: input_select.select_option
                          target:
                            entity_id:
                              - input_select.living_room_activity
                          data:
                            option: Empty
                        double_tap_action:
                          action: perform-action
                          perform_action: input_boolean.toggle
                          target:
                            entity_id:
                              - input_boolean.activity_lock_living_room
                          confirmation: false
                          data: {}
                      - entity_id: input_select.living_room_activity
                        option: Watching TV
                        tap_action:
                          action: perform-action
                          perform_action: input_select.select_option
                          data:
                            option: Watching TV
                          target:
                            entity_id: input_select.living_room_activity
                        icon: mdi:youtube-tv
                        label: TV
                        haptics: true
