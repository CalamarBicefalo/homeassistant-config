    type: entity
  cards:
  - adaptive: true
    card:
      entity: todo.house_improvements
      type: todo-list
    entity: todo.house_improvements
    popup_card_all_views: true
    title: House Improvements
    type: custom:popup-card
  - adaptive: true
    card:
      content: |
        {% set unavailable = states
          | selectattr('domain','in',['binary_sensor', 'climate', 'light', 'sensor', 'switch'])
          | selectattr('state', 'in', ['unavailable'])
          | list %}
        {% set ns = namespace(devices={}) %}
        {% for entity in unavailable %}
          {% set dev_id = device_id(entity.entity_id) %}
          {% set device_name = device_attr(dev_id, 'name_by_user') or device_attr(dev_id, 'name') %}
          {% set integrations = device_attr(dev_id, 'identifiers') | map(attribute=0) | list if dev_id else [] %}
          {% set integration = integrations[0] if integrations else 'unknown' %}
          {% if device_name and dev_id %}
            {% if device_name not in ns.devices %}
              {% set ns.devices = dict(ns.devices, **{device_name: {'since': entity.last_changed, 'integration': integration, 'id': dev_id}}) %}
            {% elif entity.last_changed < ns.devices[device_name].since %}
              {% set ns.devices = dict(ns.devices, **{device_name: {'since': entity.last_changed, 'integration': integration, 'id': dev_id}}) %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {% if ns.devices | length == 0 %}
        ✅ All devices are available
        {% else %}
        | Device | Integration | Last Seen | Actions |
        |:-------|:------------|:----------|:--------|
        {%- for device, info in ns.devices.items() | sort(attribute='0') %}
        | [{{ device }}](/config/devices/device/{{ info.id }}) | {{ info.integration }} | {{ relative_time(info.since) }} | {% if info.integration == 'zha' %} [➕Pair](/config/integrations/integration/zha) [🗺️Network](/config/zha/visualization){% endif %} |
        {%- endfor %}
        {% endif %}
      type: markdown
    entity: sensor.unavailable_entities
    popup_card_all_views: true
    title: Unavailable Devices
    type: custom:popup-card
  - adaptive: true
    card:
