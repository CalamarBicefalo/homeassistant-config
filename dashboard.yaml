views:
  - title: Home
    type: sections
    max_columns: 2
    sections:
      - type: grid
        cards:
          - type: custom:custom-features-card
            features:
              - type: custom:service-call
                entries:
                  - type: selector
                    entity_id: input_select.mode
                    options:
                      - entity_id: input_select.mode
                        option: Day
                        tap_action:
                          action: perform-action
                          perform_action: input_select.select_option
                          data:
                            option: Day
                          target:
                            entity_id: input_select.mode
                        icon: fa7-solid:sun
                        styles: ""
                        type: button
                        label: Day
                      - entity_id: input_select.mode
                        option: Night
                        tap_action:
                          action: perform-action
                          perform_action: input_select.select_option
                          data:
                            option: Night
                          target:
                            entity_id: input_select.mode
                        label: Night
                        icon: mdi:moon-waning-crescent
                        type: button
                        styles: ""
                      - entity_id: input_select.mode
                        option: Away
                        tap_action:
                          action: perform-action
                          perform_action: input_select.select_option
                          data:
                            option: Away
                          target:
                            entity_id: input_select.mode
                        label: Away
                        icon: mdi:home-export-outline
                        type: button
                        styles: ""
                      - entity_id: input_select.mode
                        option: Sleeping
                        tap_action:
                          action: perform-action
                          perform_action: input_select.select_option
                          data:
                            option: Sleeping
                          target:
                            entity_id: input_select.mode
                        icon: mdi:sleep
                        label: Sleep
                        type: button
                        styles: ""
                    haptics: true
                    styles: ""
                    icon: mdi:house
                    thumb: md3-filled
                styles: |+

            features_position: inline
            grid_options:
              rows: 1
              columns: 24
            transparent: false
            styles: ""
            feature_height: 48
        column_span: 2
        theme: Frosted Glass
      - type: grid
        cards:
          - type: tile
            grid_options:
              rows: 1
              columns: 12
            entity: lock.main_door_lock
            name: Entrance
            show_entity_picture: true
            hide_state: false
            state_content: last_changed
            vertical: false
            tap_action:
              action: more-info
            features:
              - type: lock-commands
            features_position: inline
            card_mod:
              style:
                ha-tile-info$: |
                  .secondary {
                    display: flex;
                    flex-direction: row;
                    flex-wrap: nowrap;
                    white-space: nowrap;
                  }
                  .secondary:before {
                    margin-right: 4px;
                    content: "{{ 'Open' if is_state('binary_sensor.flat_door_cs', 'on') else 'Closed' }} · ";
                  }
          - type: tile
            entity: person.jose_carlos
            show_entity_picture: true
            state_content: state
            vertical: false
            features_position: inline
          - type: tile
            entity: person.amanda
            show_entity_picture: true
            vertical: false
            features_position: bottom
            grid_options:
              columns: 6
              rows: 1
          - type: heading
            heading_style: subtitle
        column_span: 2
      - type: grid
        cards:
          - type: custom:room-summary-card
            area: living_room
            entity: binary_sensor.living_room_motion
            sensors:
              - input_select.living_room_activity
              - sensor.living_room_blinds_device_temperature
            entities:
              - light.living_room
              - media_player.tv_2
              - media_player.living_room_stereo
            features:
              - hide_room_icon
              - hide_area_stats
              - exclude_default_entities
              - hide_sensor_icons
            grid_options:
              columns: 6
              rows: 3
            occupancy:
              entities:
                - binary_sensor.living_room_motion
              options:
                - disabled_card_styles_animation
              card_border_color: yellow
            smoke:
              entities:
                - input_boolean.activity_lock_living_room
              options:
                - disabled_card_styles_animation
              card_border_color: red
            background:
              opacity: 100
            styles:
              sensors:
                font-weight: bold;
                padding-left: 8px;
                text-shadow: 0 1px 0 black;
              title:
                font-weight: bold;
                font-size: 1.2em;
                padding-left: 5px
                text-shadow: 0 1px 0 black;
              entities:
                justify-self: end;
                margin: 4px;
            sensor_layout: stacked
            problem:
              display: active_only
            icon_opacity_preset: default
            gas:
              entities:
                - null
            water:
              entities:
                - null
            actions:
              hold_action:
                action: perform-action
                perform_action: input_select.select_option
                target:
                  entity_id:
                    - input_select.living_room_activity
                data:
                  option: Empty
              double_tap_action:
                action: perform-action
                perform_action: input_boolean.toggle
                target:
                  entity_id:
                    - input_boolean.activity_lock_living_room
                confirmation: false
                data: {}
