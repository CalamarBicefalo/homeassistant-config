    name: Unavailable
    show_icon: true
    show_name: true
    show_state: true
    tap_action:
      action: more-info
    type: entity
    visibility:
    - above: 0
      condition: numeric_state
      entity: sensor.unavailable_entities
    - condition: user
      users:
      - affe11e198de496e8078cd4951b9949b
  - color: accent
