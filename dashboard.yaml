badges:
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: sensor.kitchen_ms_temperature
    color: red
    name: Indoor
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: weather.forecast_marsh_court
    state_content: temperature
    show_entity_picture: false
    color: accent
    name: Outdoor
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: sensor.unavailable_entities
    visibility:
      - condition: numeric_state
        entity: sensor.unavailable_entities
        above: 0
    color: red
    tap_action:
      action: more-info
    name:
      type: entity
header:
