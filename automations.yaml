- id: '1712425858556'
  alias: Fetch min-max temperature
  description: Simple automation to get min and max temperature
  trigger:
  - platform: time_pattern
    minutes: '0'
  condition: []
  action:
  - service: weather.get_forecasts
    metadata: {}
    data:
      type: daily
    target:
      entity_id: weather.forecast_marsh_court
    response_variable: forecast
  - service: input_number.set_value
    metadata: {}
    data_template:
      value: '{{ forecast[''weather.forecast_marsh_court''].forecast[0].templow }}'
    target:
      entity_id: input_number.min_temperature_today
  - service: input_number.set_value
    metadata: {}
    data_template:
      value: '{{ forecast[''weather.forecast_marsh_court''].forecast[0].temperature
        }}'
    target:
      entity_id: input_number.max_temperature_today
  - service: input_number.set_value
    metadata: {}
    data_template:
      value: '{{ forecast[''weather.forecast_marsh_court''].forecast[1].temperature
        }}'
    target:
      entity_id: input_number.max_temperature_tomorrow
  - service: input_number.set_value
    metadata: {}
    data_template:
      value: '{{ forecast[''weather.forecast_marsh_court''].forecast[1].templow }}'
    target:
      entity_id: input_number.min_temperature_tomorrow
  mode: single
- id: '1713623938907'
  alias: Unavailable device watchdog
  description: Notifies of unavailable entities
  use_blueprint:
    path: gmlupatelli/unavailable_entities_notification.yaml
    input:
      exclude:
        label_id: gadgets
      sunday_enabled: false
      friday_enabled: false
      thursday_enabled: false
      wednesday_enabled: false
      tuesday_enabled: false
      monday_enabled: false
      time: '16:00:00'
      actions:
      - metadata: {}
        data:
          message: Unavailable entities {{entities}}
          title: Cleanup needed
        action: notify.mobile_app_jc_iphone
- id: '1773510464558'
  alias: Close Flat Door
  description: ''
  triggers:
  - type: not_opened
    device_id: 1cfc42db1ce88c3dda623f40cfdf8f01
    entity_id: 8e323bc45a26065baa7e8a90103712f2
    domain: binary_sensor
    trigger: device
    for:
      hours: 0
      minutes: 0
      seconds: 5
  conditions:
  - condition: device
    device_id: 587764c8bf0e0d594ae9c61069d6d4fd
    domain: lock
    entity_id: bf75a93b31678341121fff57f9d5e07d
    type: is_open
  actions:
  - action: lock.lock
    metadata: {}
    target:
      device_id: 587764c8bf0e0d594ae9c61069d6d4fd
    data: {}
  mode: single
- id: '1773511307345'
  alias: Notify if door unlocked
  description: Sends a notification to wearable device group if the door is unlocked
    or jammed for long enough
  triggers:
  - device_id: 587764c8bf0e0d594ae9c61069d6d4fd
    domain: lock
    entity_id: bf75a93b31678341121fff57f9d5e07d
    type: jammed
    trigger: device
    for:
      hours: 0
      minutes: 0
      seconds: 10
  - device_id: 587764c8bf0e0d594ae9c61069d6d4fd
    domain: lock
    entity_id: bf75a93b31678341121fff57f9d5e07d
    type: unlocked
    trigger: device
    for:
      hours: 0
      minutes: 7
      seconds: 0
  conditions: []
  actions:
  - action: notify.notify
    metadata: {}
    data:
      message: Please close the flat door
      title: Flat door open
      target:
  mode: single
