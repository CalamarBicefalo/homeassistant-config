[mypy]
mypy_path = $MYPY_CONFIG_FILE_DIR/appdaemon/apps/generated:$MYPY_CONFIG_FILE_DIR/appdaemon/apps/src:$MYPY_CONFIG_FILE_DIR/appdaemon/tests
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
ignore_missing_imports = True
# requests/yaml (used by ops/ and codegen) are installed without type stubs;
# treat them as untyped rather than erroring on the import.
disable_error_code = import-untyped
