# Brightness / window DSL. `ha gen` turns this into the template sensors in
# devices/templates/brightness_generated.yaml — one `sensor.<room>_brightness`
# per window that classifies its illuminance into dark/cloudy/bright/
# direct_sunlight (state) and exposes the raw lux, the sensor type and the
# lamp-hysteresis thresholds as attributes. The AppDaemon BrightnessHandler
# reads those sensors, so thresholds live here and nowhere else.
#
# To tweak a room: change its numbers (or point it at a dedicated profile) and
# re-run `ha gen`.

# Named threshold profiles, in lux. Reference one from a window via
# `calibration:`. Add a dedicated profile here for a one-off window.
#   cloudy/bright/direct_sunlight -> category boundaries (state)
#   lights_on_below / lights_off_above -> hysteresis dead-band for the lamp
#     decision (below lights_on_below: lamps wanted; at/above lights_off_above:
#     lamps may go off; in between: keep current state, so passing clouds don't
#     flap them)
#   blinds_shade_above -> lux at/above which the sun is strong enough that
#     shading keeps real heat out; on a cooldown day blinds shade at/above it
#     but may stay open below it to let daylight in (a heatwave overrides this
#     leniency). Only meaningful for windows that drive blinds, so omit it from
#     lamp-only (ambiance) profiles.
calibrations:
  window_t1:            # Aqara T1 (lumi.sen_ill.agl01) — faces the sky, true daylight
    cloudy: 1000
    bright: 3500
    direct_sunlight: 30000
    lights_on_below: 1500
    lights_off_above: 4000
    blinds_shade_above: 5000
  ambiance:             # Hue / Everything Presence room motion sensors — low scale, lamp-polluted
    cloudy: 60
    bright: 200
    direct_sunlight: 1000
    lights_on_below: 60
    lights_off_above: 200

windows:
  - room: Office
    type: window
    illuminance: sensor.office_br
    calibration: window_t1

  - room: Bedroom
    type: window
    illuminance: sensor.bedroom_br
    calibration: window_t1

  - room: Studio
    type: window
    illuminance: sensor.studio_br
    calibration: window_t1

  - room: Living room
    type: window
    illuminance: sensor.living_room_br
    calibration: window_t1

  - room: Kitchen
    type: ambiance
    illuminance: sensor.kitchen_ms_illuminance
    calibration: ambiance

  - room: Hallway
    type: ambiance
    illuminance: sensor.ms_hallway_ep1_illuminance
    calibration: ambiance

  - room: Wardrobe
    type: ambiance
    illuminance: sensor.bedroom_ms_epl_illuminance
    calibration: ambiance
