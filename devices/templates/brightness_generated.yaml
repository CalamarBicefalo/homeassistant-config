  - name: "Office Brightness"
    unique_id: office_brightness
    icon: mdi:white-balance-sunny
    state: "{% set lux = states('sensor.office_br') | float(0) %}{% if lux >= 50000 %}direct_sunlight{% elif lux >= 15000 %}bright{% elif lux >= 1000 %}cloudy{% else %}dark{% endif %}"
    attributes:
      illuminance: "{{ states('sensor.office_br') | float(0) }}"
      sensor_type: window
      turn_on_below: 3000
