- sensor:
  - name: "Office Brightness"
    unique_id: office_brightness
    icon: mdi:white-balance-sunny
    state: "{% set lux = states('sensor.office_br') | float(0) %}{% if lux >= 30000 %}direct_sunlight{% elif lux >= 3500 %}bright{% elif lux >= 1000 %}cloudy{% else %}dark{% endif %}"
    attributes:
      illuminance: "{{ states('sensor.office_br') | float(0) }}"
      sensor_type: window
      lights_on_below: 1500
      lights_off_above: 4000
      blinds_shade_above: 5000

